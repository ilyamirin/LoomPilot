services:
  pet-app:
    build: .
    command: >
      /bin/sh -lc
      "python /workspace/repo/scripts/bootstrap_live_worktree.py
      && cd /workspace/repo/data/live_runtime
      && uvicorn services.pet_app.app:app --app-dir /workspace/repo/data/live_runtime --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${PET_APP_PORT:-18000}:8000"
    volumes:
      - ./data:/app/data
      - .:/workspace/repo
    environment:
      DEMO_REPO_ROOT: /workspace/repo
      EXECUTOR_BOOTSTRAP_BRANCH: ${EXECUTOR_BOOTSTRAP_BRANCH:-codex/development}
      EXECUTOR_RUNTIME_BRANCH: ${EXECUTOR_RUNTIME_BRANCH:-codex/runtime}
      LIVE_WORKTREE_PATH: /workspace/repo/data/live_runtime

  control-room:
    build: .
    command: uvicorn services.control_room.app:app --host 0.0.0.0 --port 8010
    ports:
      - "${CONTROL_ROOM_PORT:-18010}:8010"
    volumes:
      - ./data:/app/data
    depends_on:
      - orchestrator

  orchestrator:
    build: .
    command: uvicorn services.orchestrator.app:app --host 0.0.0.0 --port 8020
    ports:
      - "${ORCHESTRATOR_PORT:-18020}:8020"
    environment:
      DEMO_REPO_ROOT: /workspace/repo
      DEMO_WORKTREE_ROOT: /workspace/repo/data/worktrees
      EXECUTOR_BOOTSTRAP_BRANCH: ${EXECUTOR_BOOTSTRAP_BRANCH:-codex/development}
      EXECUTOR_RUNTIME_BRANCH: ${EXECUTOR_RUNTIME_BRANCH:-codex/runtime}
      LIVE_WORKTREE_PATH: /workspace/repo/data/live_runtime
      EXECUTOR_PUSH_ENABLED: ${EXECUTOR_PUSH_ENABLED:-true}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      CODING_AGENT_BIN: ${CODING_AGENT_BIN:-/usr/local/bin/aider}
      CODING_MODEL: ${CODING_MODEL:-openrouter/qwen/qwen3-coder-plus}
      CODING_BASE_URL: ${CODING_BASE_URL:-}
      CODING_TIMEOUT_SECONDS: ${CODING_TIMEOUT_SECONDS:-900}
      CODING_REASONING_EFFORT: ${CODING_REASONING_EFFORT:-medium}
      CODING_EXTENDED_THINKING_BUDGET: ${CODING_EXTENDED_THINKING_BUDGET:-200000}
      CODING_CRITIC_MAX_ITERATIONS: ${CODING_CRITIC_MAX_ITERATIONS:-5}
      CODING_MAP_TOKENS: ${CODING_MAP_TOKENS:-0}
      CODING_EDIT_FORMAT: ${CODING_EDIT_FORMAT:-diff}
      CODING_LOG_ROOT: ${CODING_LOG_ROOT:-/workspace/repo/data/aider}
      CODING_CACHE_PROMPTS: ${CODING_CACHE_PROMPTS:-true}
      CODING_LOG_COMPLETIONS: ${CODING_LOG_COMPLETIONS:-true}
      CODING_SHOW_MODEL_WARNINGS: ${CODING_SHOW_MODEL_WARNINGS:-false}
      CODING_CHECK_MODEL_ACCEPTS_SETTINGS: ${CODING_CHECK_MODEL_ACCEPTS_SETTINGS:-false}
      GITEA_REPO_OWNER: ${GITEA_REPO_OWNER:-ilya}
      GITEA_REPO_NAME: ${GITEA_REPO_NAME:-autonomous-coding-demo}
      GITEA_PUSH_BASE_URL: ${GITEA_PUSH_BASE_URL:-http://gitea:3000}
      GITEA_PUSH_USERNAME: ${GITEA_PUSH_USERNAME}
      GITEA_PUSH_PASSWORD: ${GITEA_PUSH_PASSWORD}
      GITEA_API_BASE_URL: ${GITEA_API_BASE_URL:-http://gitea:3000}
      GITEA_HTTP_BASE_URL: ${GITEA_HTTP_BASE_URL:-http://localhost:13000}
      CI_POLL_TIMEOUT_SECONDS: ${CI_POLL_TIMEOUT_SECONDS:-180}
      CI_POLL_INTERVAL_SECONDS: ${CI_POLL_INTERVAL_SECONDS:-5}
      KANBOARD_SYNC_ENABLED: ${KANBOARD_SYNC_ENABLED:-true}
      KANBOARD_URL: ${KANBOARD_URL:-http://kanboard/jsonrpc.php}
      KANBOARD_PROJECT_NAME: ${KANBOARD_PROJECT_NAME}
      KANBOARD_ADMIN_USERNAME: ${KANBOARD_ADMIN_USERNAME}
      KANBOARD_ADMIN_PASSWORD: ${KANBOARD_ADMIN_PASSWORD}
      KANBOARD_API_USERNAME: ${KANBOARD_API_USERNAME}
      KANBOARD_API_TOKEN: ${KANBOARD_API_TOKEN}
    volumes:
      - ./data:/app/data
      - .:/workspace/repo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kanboard
      - gitea

  kanboard:
    image: kanboard/kanboard:latest
    ports:
      - "${KANBOARD_HTTP_PORT:-18080}:80"
    volumes:
      - ./data/kanboard:/var/www/app/data
      - ./data/kanboard/ssl:/etc/nginx/ssl

  kanboard-seed:
    build: .
    command: python scripts/seed_kanboard.py
    environment:
      KANBOARD_URL: http://kanboard/jsonrpc.php
      KANBOARD_ADMIN_USERNAME: ${KANBOARD_ADMIN_USERNAME}
      KANBOARD_ADMIN_PASSWORD: ${KANBOARD_ADMIN_PASSWORD}
      KANBOARD_API_USERNAME: ${KANBOARD_API_USERNAME}
      KANBOARD_API_TOKEN: ${KANBOARD_API_TOKEN}
      KANBOARD_PROJECT_NAME: ${KANBOARD_PROJECT_NAME}
      KANBOARD_DEMO_USER_USERNAME: ${KANBOARD_DEMO_USER_USERNAME}
      KANBOARD_DEMO_USER_PASSWORD: ${KANBOARD_DEMO_USER_PASSWORD}
      KANBOARD_DEMO_USER_NAME: ${KANBOARD_DEMO_USER_NAME}
      KANBOARD_DEMO_USER_EMAIL: ${KANBOARD_DEMO_USER_EMAIL}
    depends_on:
      - kanboard

  gitea:
    image: gitea/gitea:1.24.6
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__actions__ENABLED: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: http://localhost:${GITEA_HTTP_PORT:-13000}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-12222}
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: external,loopback
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
    ports:
      - "${GITEA_HTTP_PORT:-13000}:3000"
      - "${GITEA_SSH_PORT:-12222}:22"
    volumes:
      - ./data/gitea:/data

  gitea-actions-runner:
    image: gitea/act_runner:latest
    restart: unless-stopped
    environment:
      GITEA_INSTANCE_URL: http://host.docker.internal:${GITEA_HTTP_PORT:-13000}
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME:-local-docker-runner}
      GITEA_RUNNER_LABELS: ${GITEA_RUNNER_LABELS:-ubuntu-latest:docker://node:20-bookworm,ubuntu-22.04:docker://node:20-bookworm}
    volumes:
      - ./data/act_runner:/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - gitea
