services:
  pet-app:
    build: .
    command: uvicorn services.pet_app.app:app --host 0.0.0.0 --port 8000
    ports:
      - "${PET_APP_PORT:-18000}:8000"
    volumes:
      - ./data:/app/data

  control-room:
    build: .
    command: uvicorn services.control_room.app:app --host 0.0.0.0 --port 8010
    ports:
      - "${CONTROL_ROOM_PORT:-18010}:8010"
    volumes:
      - ./data:/app/data
    depends_on:
      - orchestrator

  orchestrator:
    build: .
    command: uvicorn services.orchestrator.app:app --host 0.0.0.0 --port 8020
    ports:
      - "${ORCHESTRATOR_PORT:-18020}:8020"
    volumes:
      - ./data:/app/data

  kanboard:
    image: kanboard/kanboard:latest
    ports:
      - "${KANBOARD_HTTP_PORT:-18080}:80"
    volumes:
      - ./data/kanboard:/var/www/app/data
      - ./data/kanboard/plugins:/var/www/app/plugins
      - ./data/kanboard/ssl:/etc/nginx/ssl

  kanboard-seed:
    build: .
    command: python scripts/seed_kanboard.py
    environment:
      KANBOARD_URL: http://kanboard/jsonrpc.php
      KANBOARD_ADMIN_USERNAME: ${KANBOARD_ADMIN_USERNAME}
      KANBOARD_ADMIN_PASSWORD: ${KANBOARD_ADMIN_PASSWORD}
      KANBOARD_API_USERNAME: ${KANBOARD_API_USERNAME}
      KANBOARD_API_TOKEN: ${KANBOARD_API_TOKEN}
      KANBOARD_PROJECT_NAME: ${KANBOARD_PROJECT_NAME}
      KANBOARD_DEMO_USER_USERNAME: ${KANBOARD_DEMO_USER_USERNAME}
      KANBOARD_DEMO_USER_PASSWORD: ${KANBOARD_DEMO_USER_PASSWORD}
      KANBOARD_DEMO_USER_NAME: ${KANBOARD_DEMO_USER_NAME}
      KANBOARD_DEMO_USER_EMAIL: ${KANBOARD_DEMO_USER_EMAIL}
    depends_on:
      - kanboard

  gitea:
    image: gitea/gitea:1.24.6
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__actions__ENABLED: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: http://localhost:${GITEA_HTTP_PORT:-13000}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-12222}
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: external,loopback
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
    ports:
      - "${GITEA_HTTP_PORT:-13000}:3000"
      - "${GITEA_SSH_PORT:-12222}:22"
    volumes:
      - ./data/gitea:/data

  gitea-actions-runner:
    image: gitea/act_runner:latest
    restart: unless-stopped
    environment:
      GITEA_INSTANCE_URL: http://host.docker.internal:${GITEA_HTTP_PORT:-13000}
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME:-local-docker-runner}
      GITEA_RUNNER_LABELS: ${GITEA_RUNNER_LABELS:-ubuntu-latest:docker://node:20-bookworm,ubuntu-22.04:docker://node:20-bookworm}
    volumes:
      - ./data/act_runner:/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - gitea
