name: Demo CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Show workspace
        run: pwd && ls -la

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run test suite
        run: PYTHONPATH=. pytest
