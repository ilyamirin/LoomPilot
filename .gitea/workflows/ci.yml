name: Demo CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        run: python3 -m pip install ".[dev]"

      - name: Run test suite
        run: PYTHONPATH=. python3 -m pytest
